<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg-emma" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fce7f3"/>
      <stop offset="100%" stop-color="#f9a8d4"/>
    </radialGradient>
    <radialGradient id="eye-emma" cx="35%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#1e1e1e"/>
      <stop offset="100%" stop-color="#111"/>
    </radialGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="100" cy="100" r="100" fill="url(#bg-emma)"/>
  <!-- Body -->
  <ellipse cx="100" cy="130" rx="42" ry="45" fill="#f5e6d3" stroke="#d4a574" stroke-width="1.5"/>
  <!-- Belly pattern -->
  <ellipse cx="100" cy="138" rx="25" ry="28" fill="#faf0e6" stroke="#e8c9a0" stroke-width="1"/>
  <!-- Belly lines -->
  <path d="M88 125 Q100 128 112 125" fill="none" stroke="#e0b888" stroke-width="0.8" opacity="0.6"/>
  <path d="M86 133 Q100 136 114 133" fill="none" stroke="#e0b888" stroke-width="0.8" opacity="0.6"/>
  <path d="M87 141 Q100 144 113 141" fill="none" stroke="#e0b888" stroke-width="0.8" opacity="0.6"/>
  <path d="M89 149 Q100 152 111 149" fill="none" stroke="#e0b888" stroke-width="0.8" opacity="0.6"/>
  <!-- Head -->
  <ellipse cx="100" cy="85" rx="40" ry="35" fill="#f5e6d3" stroke="#d4a574" stroke-width="1.5"/>
  <!-- Ear tufts -->
  <path d="M65 60 L72 48 L80 65" fill="#d4a574" stroke="#c49660" stroke-width="1.2" stroke-linejoin="round"/>
  <path d="M135 60 L128 48 L120 65" fill="#d4a574" stroke="#c49660" stroke-width="1.2" stroke-linejoin="round"/>
  <!-- Face disc left -->
  <ellipse cx="85" cy="82" rx="18" ry="17" fill="#faf0e6" stroke="#e0c8a8" stroke-width="1"/>
  <!-- Face disc right -->
  <ellipse cx="115" cy="82" rx="18" ry="17" fill="#faf0e6" stroke="#e0c8a8" stroke-width="1"/>
  <!-- Eyes - big and round -->
  <circle cx="85" cy="82" r="10" fill="url(#eye-emma)"/>
  <circle cx="115" cy="82" r="10" fill="url(#eye-emma)"/>
  <!-- Eye highlights -->
  <circle cx="82" cy="79" r="3.5" fill="white" opacity="0.9"/>
  <circle cx="112" cy="79" r="3.5" fill="white" opacity="0.9"/>
  <circle cx="88" cy="85" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="118" cy="85" r="1.5" fill="white" opacity="0.6"/>
  <!-- Beak -->
  <path d="M96 92 L100 100 L104 92" fill="#f59e0b" stroke="#d97706" stroke-width="1" stroke-linejoin="round"/>
  <!-- Blush -->
  <ellipse cx="72" cy="92" rx="7" ry="4" fill="#f472b6" opacity="0.25"/>
  <ellipse cx="128" cy="92" rx="7" ry="4" fill="#f472b6" opacity="0.25"/>
  <!-- Wings -->
  <path d="M58 115 Q48 130 55 150 Q60 140 65 125" fill="#e8d5b8" stroke="#d4a574" stroke-width="1.2"/>
  <path d="M142 115 Q152 130 145 150 Q140 140 135 125" fill="#e8d5b8" stroke="#d4a574" stroke-width="1.2"/>
  <!-- Feet -->
  <path d="M85 172 L80 180 M85 172 L85 181 M85 172 L90 180" stroke="#f59e0b" stroke-width="2" stroke-linecap="round" fill="none"/>
  <path d="M115 172 L110 180 M115 172 L115 181 M115 172 L120 180" stroke="#f59e0b" stroke-width="2" stroke-linecap="round" fill="none"/>
</svg>