<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background -->
  <circle cx="100" cy="100" r="100" fill="#80deea"/>
  <circle cx="100" cy="100" r="80" fill="#e0f7fa" opacity="0.5"/>
  <!-- Body -->
  <ellipse cx="100" cy="140" rx="40" ry="38" fill="#8B6914" stroke="#6B4E0A" stroke-width="1.5"/>
  <!-- Belly -->
  <ellipse cx="100" cy="148" rx="28" ry="25" fill="#D2A64A" stroke="#B8903A" stroke-width="1"/>
  <!-- Head -->
  <ellipse cx="100" cy="82" rx="38" ry="34" fill="#8B6914" stroke="#6B4E0A" stroke-width="1.5"/>
  <!-- Ears -->
  <circle cx="68" cy="58" r="10" fill="#6B4E0A" stroke="#5A3F08" stroke-width="1"/>
  <circle cx="68" cy="58" r="6" fill="#D2A64A"/>
  <circle cx="132" cy="58" r="10" fill="#6B4E0A" stroke="#5A3F08" stroke-width="1"/>
  <circle cx="132" cy="58" r="6" fill="#D2A64A"/>
  <!-- Face lighter area -->
  <ellipse cx="100" cy="88" rx="26" ry="22" fill="#A67C1A" opacity="0.5"/>
  <!-- Eyes -->
  <ellipse cx="85" cy="78" rx="7" ry="8" fill="white" stroke="#5A3F08" stroke-width="1"/>
  <ellipse cx="115" cy="78" rx="7" ry="8" fill="white" stroke="#5A3F08" stroke-width="1"/>
  <circle cx="86" cy="78" r="4.5" fill="#1a1a1a"/>
  <circle cx="116" cy="78" r="4.5" fill="#1a1a1a"/>
  <circle cx="84" cy="76" r="2" fill="white" opacity="0.9"/>
  <circle cx="114" cy="76" r="2" fill="white" opacity="0.9"/>
  <!-- Nose -->
  <ellipse cx="100" cy="90" rx="6" ry="4" fill="#3a2a0a" stroke="#2a1a00" stroke-width="0.8"/>
  <ellipse cx="99" cy="89" rx="1.5" ry="1" fill="white" opacity="0.3"/>
  <!-- Mouth / buck teeth -->
  <path d="M94 96 Q100 102 106 96" fill="none" stroke="#5A3F08" stroke-width="1.2"/>
  <!-- Buck teeth -->
  <rect x="95" y="96" width="4.5" height="6" rx="1" fill="white" stroke="#ccc" stroke-width="0.5"/>
  <rect x="100.5" y="96" width="4.5" height="6" rx="1" fill="white" stroke="#ccc" stroke-width="0.5"/>
  <!-- Blush -->
  <ellipse cx="72" cy="90" rx="7" ry="4" fill="#06b6d4" opacity="0.2"/>
  <ellipse cx="128" cy="90" rx="7" ry="4" fill="#06b6d4" opacity="0.2"/>
  <!-- Arms/paws -->
  <path d="M60 125 Q50 140 58 155 Q62 148 66 135" fill="#7A5C10" stroke="#6B4E0A" stroke-width="1.2"/>
  <path d="M140 125 Q150 140 142 155 Q138 148 134 135" fill="#7A5C10" stroke="#6B4E0A" stroke-width="1.2"/>
  <!-- Tail -->
  <ellipse cx="100" cy="176" rx="16" ry="8" fill="#6B4E0A" stroke="#5A3F08" stroke-width="1" transform="rotate(-5 100 176)"/>
  <!-- Hard hat (builder!) -->
  <path d="M66 68 Q100 42 134 68" fill="#06b6d4" stroke="#0891b2" stroke-width="1.5"/>
  <rect x="62" y="66" width="76" height="6" rx="2" fill="#06b6d4" stroke="#0891b2" stroke-width="1"/>
</svg>